# =============================================================================
# Telegraf configuration
# Listens for metrics on port 8186 (HTTP listener v2 — line protocol)
# Forwards everything to InfluxDB 1.x on 172.28.0.2:8086
# =============================================================================

[global_tags]
  stack = "monitoring"

[agent]
  interval          = "10s"
  round_interval    = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval    = "10s"
  hostname          = "telegraf"
  omit_hostname     = false

# -----------------------------------------------------------------------------
# INPUT: HTTP listener — Python generator POSTs line-protocol data here
# Telegraf listens on 0.0.0.0:8186 inside the container
# (we do NOT expose 8186 to the host — only internal traffic)
# -----------------------------------------------------------------------------
[[inputs.http_listener_v2]]
  service_address = "0.0.0.0:8186"
  paths           = ["/telegraf"]
  data_format     = "influx"

# -----------------------------------------------------------------------------
# OUTPUT: InfluxDB 1.x
# Uses the dedicated write-only user created by init-retention.sh
# -----------------------------------------------------------------------------
[[outputs.influxdb]]
  urls     = ["http://172.28.0.2:8086"]   # static IP — no DNS ambiguity
  database = "${INFLUXDB_DB}"
  username = "${INFLUXDB_WRITE_USER}"
  password = "${INFLUXDB_WRITE_USER_PASSWORD}"
  retention_policy = "60d_policy"
  skip_database_creation = true
  timeout  = "5s"

  # Retry on transient errors
  [outputs.influxdb.tagpass]
    stack = ["monitoring"]