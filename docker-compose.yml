# docker-compose.yml
# Note: top-level `version` key is obsolete in Compose v2+ and has been removed.
# ---------------------------------------------------------------------------
# Volumes — one per service so backups / restores stay independent
# ---------------------------------------------------------------------------
volumes:
  influxdb_data:
    driver: local
  grafana_data:
    driver: local

# ---------------------------------------------------------------------------
# Network topology  — /28 (14 usable addresses):
#
#   172.28.0.1  — bridge gateway (Docker host side)
#   172.28.0.2  — influxdb
#   172.28.0.3  — grafana
#   172.28.0.4  — announcer (ephemeral, exits after printing)
#   172.28.0.5  — telegraf
#   172.28.0.6  — reserved
#
#
#     Data Flow:
#       [host venv script] --> POST line-protocol --> localhost:8186
#                                                 (mapped to telegraf:8186)
#       telegraf  → influxdb:8086  (172.28.0.2, write user)
#       grafana   → influxdb:8086  (172.28.0.2, read-only user)
# Grafana → InfluxDB: http://influxdb:8086   (Docker DNS — recommended)
#                     http://172.28.0.2:8086 (static IP  — equally valid)
# ---------------------------------------------------------------------------
networks:
  monitoring:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/28
          gateway: 172.28.0.1

services:

  # -------------------------------------------------------------------------
  # InfluxDB 1.x  (latest 1.x image — currently 1.12)
  # Accepts metrics on host port 8086
  # Retention is set to 60 days via an init script
  # Static IP: 172.28.0.2
  # Users: admin, grafana_reader (RO), telegraf_writer (WO)
  # -------------------------------------------------------------------------
  influxdb:
    image: influxdb:1.12
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"               # expose to host so external agents can push
    environment:
      TZ:                           Europe/Moscow
      INFLUXDB_DB:                  ${INFLUXDB_DB}
      INFLUXDB_HTTP_AUTH_ENABLED:   ${INFLUXDB_HTTP_AUTH_ENABLED}
      INFLUXDB_ADMIN_USER:          ${INFLUXDB_ADMIN_USER}
      INFLUXDB_ADMIN_PASSWORD:      ${INFLUXDB_ADMIN_PASSWORD}
      INFLUXDB_READ_USER:           ${INFLUXDB_READ_USER}
      INFLUXDB_READ_USER_PASSWORD:  ${INFLUXDB_READ_USER_PASSWORD}
      INFLUXDB_WRITE_USER:          ${INFLUXDB_WRITE_USER}
      INFLUXDB_WRITE_USER_PASSWORD: ${INFLUXDB_WRITE_USER_PASSWORD}
      INFLUXDB_HTTP_BIND_ADDRESS:   ":8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
      - ./influxdb/influxdb.conf:/etc/influxdb/influxdb.conf:ro
      - ./influxdb/init-retention.sh:/docker-entrypoint-initdb.d/init-retention.sh:ro
    networks:
      monitoring:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # -------------------------------------------------------------------------
  # Grafana (latest stable OSS image)
  # UI reachable on host port 3000 over plain HTTP
  # Static IP: 172.28.0.3
  # Connects to InfluxDB at:
  #   http://influxdb:8086   (Docker DNS — recommended)
  #   http://172.28.0.2:8086 (static IP — equally valid)
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ:                              Europe/Moscow
      GF_SECURITY_ADMIN_USER:          ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD:      ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY:          ${GF_SECURITY_SECRET_KEY}
      GF_SERVER_PROTOCOL:              http
      GF_ANALYTICS_REPORTING_ENABLED:  "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES:  "false"
      GF_DATABASE_WAL:                 "true"
      # Default timezone shown in dashboards
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Europe/Moscow
      # Credentials forwarded into provisioning templates
      INFLUXDB_DB:                     ${INFLUXDB_DB}
      INFLUXDB_READ_USER:              ${INFLUXDB_READ_USER}
      INFLUXDB_READ_USER_PASSWORD:     ${INFLUXDB_READ_USER_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      monitoring:
        ipv4_address: 172.28.0.3
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

 # -------------------------------------------------------------------------
  # Telegraf 1.36
  # • host:8186 — receives line-protocol from the host venv script
  # • Forwards to influxdb:8086 using telegraf_writer credentials
  # • Port 8186 is exposed to host so the venv script can reach it
  # -------------------------------------------------------------------------
  telegraf:
    image: telegraf:1.36
    container_name: telegraf
    restart: unless-stopped
    ports:
      - "8186:8186"           # host script sends here: http://localhost:8186/telegraf
    environment:
      TZ:                           Europe/Moscow
      INFLUXDB_DB:                  ${INFLUXDB_DB}
      INFLUXDB_WRITE_USER:          ${INFLUXDB_WRITE_USER}
      INFLUXDB_WRITE_USER_PASSWORD: ${INFLUXDB_WRITE_USER_PASSWORD}
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      monitoring:
        ipv4_address: 172.28.0.5
    depends_on:
      influxdb:
        condition: service_healthy     

  # -------------------------------------------------------------------------
  # Announcer — ephemeral alpine container that prints access URLs once both
  # InfluxDB and Grafana pass their healthchecks, then exits (restart: no).
  # The host LAN IP is auto-detected via the default-route gateway address.
  # -------------------------------------------------------------------------
  announcer:
    image: alpine:3.20
    container_name: stack_announcer
    restart: "no"
    environment:
      TZ: Europe/Moscow
    networks:
      monitoring:
        ipv4_address: 172.28.0.4
    depends_on:
      influxdb:
        condition: service_healthy
      grafana:
        condition: service_healthy
    entrypoint: >
      sh -c "
        HOST_IP=$$(ip route | awk '/default/ {print $$3; exit}');
        echo '';
        echo '╔═══════════════════════════════════════════════════════════════════╗';
        echo '║   ✅  Monitoring stack is up!                                    ║';
        echo '╠═══════════════════════════════════════════════════════════════════╣';
        echo '║  Grafana UI                                                       ║';
        echo \"║    → http://localhost:3000         (from this machine)            ║\";
        echo \"║    → http://$$HOST_IP:3000         (LAN / remote)                ║\";
        echo '╠═══════════════════════════════════════════════════════════════════╣';
        echo '║  Telegraf HTTP listener  (for venv script)                        ║';
        echo \"║    → http://localhost:8186/telegraf                               ║\";
        echo '║  InfluxDB write endpoint (direct / external agents)               ║';
        echo \"║    → http://localhost:8086                                        ║\";
        echo '╠═══════════════════════════════════════════════════════════════════╣';
        echo '║  Internal network  172.28.0.0/28                                  ║';
        echo '║    influxdb   172.28.0.2:8086                                     ║';
        echo '║    grafana    172.28.0.3:3000                                     ║';
        echo '║    telegraf   172.28.0.5:8186                                     ║';
        echo '╠═══════════════════════════════════════════════════════════════════╣';
        echo '║  To generate test data (from project root):                       ║';
        echo '║    cd data_generator && source venv/bin/activate                  ║';
        echo '║    python cpu_generator.py                    # default settings  ║';
        echo '║    python cpu_generator.py --interval 1 --runs 500  # fast burst  ║';
        echo '╚═══════════════════════════════════════════════════════════════════╝';
        echo '';
      "